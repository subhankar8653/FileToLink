<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:image" content="https://i.ibb.co/mVkSySr7/suhani-bot.png">
    <title>Stream: {{ file_name }}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .video-container {
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }
        
        video {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .placeholder {
            aspect-ratio: 16/9;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 15px;
            color: #ccc;
        }
        
        .placeholder svg {
            width: 80px;
            height: 80px;
            opacity: 0.5;
        }
        
        .actions {
            background: rgba(30, 30, 46, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
        }
        
        .download-btn {
            display: block;
            width: 100%;
            background: linear-gradient(135deg, #f85032 0%, #e73827 100%);
            color: white;
            text-align: center;
            padding: 16px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: transform 0.2s, box-shadow 0.2s;
            border: none;
            cursor: pointer;
            margin-bottom: 15px;
        }
        
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(248, 80, 50, 0.4);
        }
        
        .button-group {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
        }
        
        .icon-btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        .players {
            margin-top: 20px;
        }
        
        .players h3 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #f85032;
            margin-bottom: 15px;
        }
        
        .player-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        
        .player-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ccc;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .player-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            color: #fff;
        }
        
        .player-btn::before {
            content: '▶';
            font-size: 12px;
            opacity: 0.6;
        }
        
        @media (max-width: 600px) {
            body {
                padding: 15px;
            }
            
            .actions {
                padding: 20px;
            }
            
            .player-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="video-container">
            <div class="placeholder">
                <svg fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/>
                </svg>
                <p>If video not playing</p>
                <p style="opacity: 0.7; font-size: 14px;">Use External Player</p>
            </div>
        </div>
        
        <div class="actions">
            <a href="{{ src }}" class="download-btn" download="{{ file_name }}">
                ⬇ Download
            </a>
            
            <div class="button-group">
                <button class="icon-btn" onclick="copyLink()">
                    📋 Copy Link
                </button>
                <button class="icon-btn" onclick="shareLink()">
                    📤 Share
                </button>
            </div>
            
            <div class="players">
                <h3>• Android</h3>
                <div class="player-grid">
                    <a href="vlc://{{ src }}" class="player-btn">VLC</a>
                    <a href="mxplayer://{{ src }}" class="player-btn">MX Player</a>
                    <a href="intent:{{ src }}#Intent;package=com.mxtech.videoplayer.pro;end" class="player-btn">MX Player Pro</a>
                    <a href="splayerintent:{{ src }}" class="player-btn">Splayer</a>
                    <a href="intent:{{ src }}#Intent;package=com.nexstreaming.app.kinemasterfree;end" class="player-btn">Next Player</a>
                    <a href="intent:{{ src }}#Intent;package=com.nova.player;end" class="player-btn">Nova Player</a>
                    <a href="mpv://{{ src }}" class="player-btn">MPV-Android</a>
                    <a href="justplayer://{{ src }}" class="player-btn">Just Player</a>
                    <a href="nplayer-{{ src }}" class="player-btn">nPlayer</a>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function copyLink() {
            const link = "{{ src }}";
            if (navigator.clipboard) {
                navigator.clipboard.writeText(link).then(() => {
                    alert('Link copied to clipboard!');
                }).catch(() => {
                    fallbackCopy(link);
                });
            } else {
                fallbackCopy(link);
            }
        }
        
        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                alert('Link copied!');
            } catch (err) {
                alert('Failed to copy link');
            }
            document.body.removeChild(textarea);
        }
        
        function shareLink() {
            const link = "{{ src }}";
            const title = "{{ file_name }}";
            
            if (navigator.share) {
                navigator.share({
                    title: title,
                    url: link
                }).catch(() => {});
            } else {
                copyLink();
            }
        }
    </script>
</body>
</html>
